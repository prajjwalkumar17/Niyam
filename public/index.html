<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niyam - Command Governance</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <span class="logo-text">Niyam</span>
            </div>
            <div class="logo-subtitle">Command Governance</div>
        </div>
        <ul class="nav-links">
            <li>
                <a href="#dashboard" class="nav-link" data-page="dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="#pending" class="nav-link" data-page="pending">
                    <span class="nav-icon">⏳</span>
                    <span class="nav-text">Pending</span>
                    <span class="badge" id="pending-badge" style="display:none">0</span>
                </a>
            </li>
            <li>
                <a href="#history" class="nav-link" data-page="history">
                    <span class="nav-icon">📜</span>
                    <span class="nav-text">History</span>
                </a>
            </li>
            <li>
                <a href="#rules" class="nav-link" data-page="rules">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">Rules</span>
                </a>
            </li>
            <li>
                <a href="#audit" class="nav-link" data-page="audit">
                    <span class="nav-icon">🔍</span>
                    <span class="nav-text">Audit Log</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="connection-status" id="ws-status">
                <span class="status-dot disconnected"></span>
                <span class="status-text">Disconnected</span>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <h1 class="page-title" id="page-title">Dashboard</h1>
            <div class="topbar-actions">
                <div class="session-pill" id="session-pill">Not signed in</div>
                <button class="btn btn-secondary" id="auto-refresh-toggle" onclick="toggleAutoRefresh()" title="Toggle auto refresh">
                    🔄 Auto: ON
                </button>
                <button class="btn btn-primary" id="submit-command-btn">
                    <span class="btn-icon">+</span> Submit Command
                </button>
                <button class="btn btn-secondary" id="logout-btn" style="display:none">
                    Sign Out
                </button>
            </div>
        </header>

        <!-- Page Content Container -->
        <div class="page-container" id="page-container">
            <!-- Pages rendered dynamically -->
        </div>
    </main>

    <!-- Submit Command Modal -->
    <div class="modal-overlay" id="submit-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2>Submit Command</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="cmd-input">Command</label>
                    <input type="text" id="cmd-input" class="form-input" placeholder="e.g., gh pr merge 42">
                </div>
                <div class="form-group">
                    <label for="cmd-args">Arguments (comma-separated)</label>
                    <input type="text" id="cmd-args" class="form-input" placeholder="e.g., --squash, --delete-branch">
                </div>
                <div class="form-group">
                    <label for="cmd-requester">Requester</label>
                    <input type="text" id="cmd-requester" class="form-input" readonly>
                    
                    <label for="cmd-timeout">Timeout (hours) <span style="color:var(--text-muted);font-weight:normal">optional, default 10h</span></label>
                    <input type="number" id="cmd-timeout" class="form-input" placeholder="e.g. 10" min="1" max="168" step="1">
                </div>
                <div class="form-group">
                    <label for="cmd-working-dir">Working Directory</label>
                    <input type="text" id="cmd-working-dir" class="form-input" placeholder="Optional absolute path">
                </div>
                <div class="risk-preview" id="risk-preview" style="display:none">
                    <span class="risk-label" id="risk-preview-label">RISK</span>
                    <span class="risk-text" id="risk-preview-text"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="submit-btn" onclick="submitCommand()">Submit</button>
            </div>
        </div>
    </div>

    <!-- Approval Modal -->
    <div class="modal-overlay" id="approval-modal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2 id="approval-modal-title">Approve Command</h2>
                <button class="modal-close" onclick="closeApprovalModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="command-detail" id="approval-command-detail"></div>
                <div class="form-group">
                    <label for="approval-rationale">Rationale</label>
                    <textarea id="approval-rationale" class="form-input" rows="3" placeholder="Why are you approving/rejecting this?"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="reject-btn" onclick="processApproval('reject')">Reject</button>
                <button class="btn btn-success" id="approve-btn" onclick="processApproval('approve')">Approve</button>
            </div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div class="modal-overlay" id="login-overlay" style="display:none">
        <div class="modal login-modal">
            <div class="modal-header">
                <h2>Sign In</h2>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" class="form-input" autocomplete="username" value="admin">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" autocomplete="current-password">
                </div>
                <div class="text-sm text-muted" id="login-status">Dashboard access requires a local admin session.</div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="login-btn">Sign In</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/js/app.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/pending.js"></script>
    <script src="/js/pages/history.js"></script>
    <script src="/js/pages/rules.js"></script>
    <script src="/js/pages/audit.js"></script>
</body>
</html>
